<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SIBUK BOS - Maintenance</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      font-family:'Poppins',sans-serif;
      min-height:100vh;
      background:linear-gradient(135deg,#0f172a,#111827,#1e293b);
      overflow:hidden;
      display:flex;
      align-items:center;
      justify-content:center;
      color:white;
      position:relative;
    }

    .bg-glow{
      position:absolute;
      width:500px;
      height:500px;
      background:rgba(34,197,94,0.15);
      filter:blur(120px);
      border-radius:50%;
      animation:floatGlow 8s ease-in-out infinite;
    }

    @keyframes floatGlow{
      0%,100%{
        transform:translateY(0px) translateX(0px);
      }
      50%{
        transform:translateY(-30px) translateX(20px);
      }
    }

    .container{
      width:90%;
      max-width:1100px;
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:40px;
      align-items:center;
      z-index:2;
    }

    .left h1{
      font-size:64px;
      line-height:1.1;
      margin-bottom:20px;
      font-weight:700;
    }

    .left h1 span{
      color:#22c55e;
      text-shadow:0 0 15px rgba(34,197,94,0.5);
    }

    .left p{
      color:#cbd5e1;
      font-size:18px;
      line-height:1.8;
      margin-bottom:30px;
    }

    .badge{
      display:inline-flex;
      align-items:center;
      gap:10px;
      background:rgba(255,255,255,0.08);
      border:1px solid rgba(255,255,255,0.1);
      padding:12px 18px;
      border-radius:999px;
      margin-bottom:25px;
      backdrop-filter:blur(10px);
    }

    .dot{
      width:10px;
      height:10px;
      background:#22c55e;
      border-radius:50%;
      animation:pulse 1.5s infinite;
    }

    @keyframes pulse{
      0%{
        transform:scale(1);
        opacity:1;
      }
      50%{
        transform:scale(1.8);
        opacity:.4;
      }
      100%{
        transform:scale(1);
        opacity:1;
      }
    }

    .btn{
      display:inline-block;
      padding:14px 28px;
      background:#22c55e;
      color:#fff;
      text-decoration:none;
      border-radius:14px;
      font-weight:600;
      transition:.3s;
      box-shadow:0 10px 30px rgba(34,197,94,.3);
    }

    .btn:hover{
      transform:translateY(-4px);
      background:#16a34a;
    }

    .right{
      display:flex;
      justify-content:center;
      align-items:center;
    }

    .svg-box{
      width:100%;
      max-width:500px;
      animation:float 4s ease-in-out infinite;
    }

    @keyframes float{
      0%,100%{
        transform:translateY(0px);
      }
      50%{
        transform:translateY(-15px);
      }
    }

    .gear-big{
      transform-origin:center;
      animation:spin 8s linear infinite;
    }

    .gear-small{
      transform-origin:center;
      animation:spinReverse 5s linear infinite;
    }

    @keyframes spin{
      from{
        transform:rotate(0deg);
      }
      to{
        transform:rotate(360deg);
      }
    }

    @keyframes spinReverse{
      from{
        transform:rotate(360deg);
      }
      to{
        transform:rotate(0deg);
      }
    }

    .blink{
      animation:blink 2s infinite;
    }

    @keyframes blink{
      0%,45%,100%{
        opacity:1;
      }
      50%{
        opacity:0;
      }
    }

    .floating-icon{
      position:absolute;
      opacity:.08;
      animation:floatIcons 10s linear infinite;
    }

    @keyframes floatIcons{
      0%{
        transform:translateY(100vh) rotate(0deg);
      }
      100%{
        transform:translateY(-120vh) rotate(360deg);
      }
    }

    @media(max-width:900px){
      .container{
        grid-template-columns:1fr;
        text-align:center;
      }

      .left h1{
        font-size:42px;
      }

      .left p{
        font-size:16px;
      }
    }
  </style>
</head>

<body>

  <div class="bg-glow"></div>

  <!-- Floating Icons -->
  <svg class="floating-icon" style="left:10%; width:40px; animation-duration:12s;" viewBox="0 0 24 24" fill="white">
    <path d="M12 2L15 9H22L16.5 13.5L18.5 21L12 16.8L5.5 21L7.5 13.5L2 9H9L12 2Z"/>
  </svg>

  <svg class="floating-icon" style="left:80%; width:50px; animation-duration:15s;" viewBox="0 0 24 24" fill="white">
    <circle cx="12" cy="12" r="10"/>
  </svg>

  <div class="container">

    <div class="left">

      <div class="badge">
        <div class="dot"></div>
        <span>Sistem sedang diperbarui</span>
      </div>

      <h1>
        SIBUK <span>BOS</span><br>
        Sedang Maintenance
      </h1>

      <p>
        Tenang yaa 👋  
        Tim kami sedang memperbaiki dan menambahkan fitur baru agar pengalaman menggunakan SIBUK BOS jadi lebih cepat, stabil, dan nyaman.
      </p>

      <a href="#" class="btn">
        Coba Lagi Nanti
      </a>

    </div>

    <div class="right">

      <svg class="svg-box" viewBox="0 0 600 500" fill="none" xmlns="http://www.w3.org/2000/svg">

        <!-- Shadow -->
        <ellipse cx="300" cy="420" rx="170" ry="30" fill="#000" opacity="0.2"/>

        <!-- Computer -->
        <rect x="170" y="120" width="260" height="180" rx="18" fill="#1E293B"/>
        <rect x="185" y="135" width="230" height="150" rx="12" fill="#0F172A"/>

        <!-- Cute Face -->
        <circle cx="255" cy="205" r="12" fill="#22C55E" class="blink"/>
        <circle cx="345" cy="205" r="12" fill="#22C55E" class="blink"/>

        <path d="M260 245 Q300 275 340 245" 
              stroke="#22C55E" 
              stroke-width="8" 
              stroke-linecap="round"/>

        <!-- Stand -->
        <rect x="275" y="300" width="50" height="45" rx="8" fill="#334155"/>
        <rect x="220" y="340" width="160" height="18" rx="9" fill="#475569"/>

        <!-- Big Gear -->
        <g class="gear-big">
          <circle cx="130" cy="180" r="45" fill="#22C55E"/>
          <circle cx="130" cy="180" r="18" fill="#0F172A"/>

          <rect x="126" y="120" width="8" height="25" rx="4" fill="#22C55E"/>
          <rect x="126" y="215" width="8" height="25" rx="4" fill="#22C55E"/>

          <rect x="70" y="176" width="25" height="8" rx="4" fill="#22C55E"/>
          <rect x="165" y="176" width="25" height="8" rx="4" fill="#22C55E"/>

          <rect x="89" y="138" width="8" height="25" rx="4" transform="rotate(-45 89 138)" fill="#22C55E"/>
          <rect x="163" y="212" width="8" height="25" rx="4" transform="rotate(-45 163 212)" fill="#22C55E"/>

          <rect x="163" y="138" width="8" height="25" rx="4" transform="rotate(45 163 138)" fill="#22C55E"/>
          <rect x="89" y="212" width="8" height="25" rx="4" transform="rotate(45 89 212)" fill="#22C55E"/>
        </g>

        <!-- Small Gear -->
        <g class="gear-small">
          <circle cx="460" cy="280" r="30" fill="#38BDF8"/>
          <circle cx="460" cy="280" r="12" fill="#0F172A"/>

          <rect x="456" y="235" width="8" height="18" rx="4" fill="#38BDF8"/>
          <rect x="456" y="307" width="8" height="18" rx="4" fill="#38BDF8"/>

          <rect x="415" y="276" width="18" height="8" rx="4" fill="#38BDF8"/>
          <rect x="487" y="276" width="18" height="8" rx="4" fill="#38BDF8"/>
        </g>

        <!-- Floating Tools -->
        <g>
          <rect x="470" y="120" width="60" height="14" rx="7" fill="#FACC15"/>
          <circle cx="530" cy="127" r="10" fill="#F59E0B"/>
        </g>

        <!-- Floating Dots -->
        <circle cx="500" cy="180" r="6" fill="#22C55E">
          <animate attributeName="cy" values="180;160;180" dur="2s" repeatCount="indefinite"/>
        </circle>

        <circle cx="520" cy="220" r="4" fill="#38BDF8">
          <animate attributeName="cy" values="220;200;220" dur="3s" repeatCount="indefinite"/>
        </circle>

      </svg>

    </div>

  </div>

</body>
</html>
