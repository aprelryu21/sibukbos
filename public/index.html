<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Maintenance | SIBUK BOS 2.0</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { background-color: #F6F9FC; color: #0A2540; font-family: -apple-system, sans-serif; }
    .spatial-glass {
      background: rgba(255, 255, 255, 0.7);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.8);
      box-shadow: 0 20px 50px rgba(10, 37, 64, 0.1);
    }
    @keyframes gear-spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    .spin-gear { animation: gear-spin 4s linear infinite; transform-origin: center; }
    @keyframes robot-bob { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
    .animate-bob { animation: robot-bob 3s ease-in-out infinite; }
  </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6">

  <!-- Background Mesh -->
  <div class="fixed inset-0 z-0 bg-[radial-gradient(ellipse_at_top,_var(--tw-gradient-stops))] from-blue-100 via-white to-purple-50"></div>

  <div class="spatial-glass relative z-10 w-full max-w-lg rounded-[2.5rem] p-8 md:p-12 text-center">
    
    <!-- SVG Animasi Lucu -->
    <div class="mb-8 animate-bob">
      <svg viewBox="0 0 200 200" class="w-40 h-40 mx-auto">
        <!-- Robot Body -->
        <rect x="60" y="80" width="80" height="70" rx="15" fill="#635BFF" />
        <!-- Head -->
        <rect x="75" y="40" width="50" height="40" rx="10" fill="#635BFF" />
        <circle cx="90" cy="55" r="5" fill="white" />
        <circle cx="110" cy="55" r="5" fill="white" />
        <!-- Gear -->
        <circle cx="100" cy="115" r="20" fill="none" stroke="#FBBF24" stroke-width="6" class="spin-gear" />
        <path d="M100 95 L 100 85 M100 135 L 100 145 M80 115 L 70 115 M120 115 L 130 115" stroke="#FBBF24" stroke-width="6" class="spin-gear" />
      </svg>
    </div>

    <h1 class="text-3xl md:text-4xl font-black text-brand mb-4 tracking-tight">Sistem Sedang Sibuk!</h1>
    <p class="text-gray-500 font-medium mb-8 leading-relaxed">
      Tim pengembang sedang melakukan pemeliharaan rutin untuk meningkatkan performa SIBUK BOS 2.0 agar lebih stabil dan canggih. Mohon tunggu sebentar ya!
    </p>

    <button onclick="window.location.reload()" class="bg-primary hover:bg-indigo-700 text-white font-bold py-4 px-8 rounded-2xl shadow-lg transition-transform active:scale-95 mb-4 block w-full">
      Coba Refresh Halaman
    </button>
    
    <button onclick="hubungiAdminWa()" class="text-gray-400 hover:text-primary font-bold text-sm transition-colors">
      Butuh bantuan mendesak? Hubungi Admin
    </button>
  </div>

  <script>
    function hubungiAdminWa() {
      const nomorWA = "6282114445631"; 
      const pesan = "Halo Admin, saya melihat aplikasi SIBUK BOS sedang maintenance. Kira-kira kapan kembali normal ya?";
      window.open("https://wa.me/" + nomorWA + "?text=" + encodeURIComponent(pesan), '_blank');
    }
  </script>
</body>
</html>
