<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>System Maintenance | SIBUK BOS 2.0</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { background: #F6F9FC; font-family: -apple-system, sans-serif; }
    
    /* Animasi */
    @keyframes blink { 0%, 90%, 100% { transform: scaleY(1); } 95% { transform: scaleY(0.1); } }
    .animate-blink { animation: blink 4s infinite; transform-origin: center; }
    
    @keyframes spin-gear { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    .spin-gear { animation: spin-gear 6s linear infinite; transform-origin: 100px 100px; }
    
    @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }
    .animate-float { animation: float 3s ease-in-out infinite; }
  </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">

  <!-- Background Mesh -->
  <div class="fixed inset-0 z-0 bg-[radial-gradient(circle_at_50%_50%,#e0e7ff,transparent)] opacity-50"></div>

  <div class="relative z-10 w-full max-w-sm bg-white/60 backdrop-blur-2xl border border-white/50 p-8 rounded-[2.5rem] shadow-2xl text-center">
    
    <!-- Robot Animasi -->
    <div class="animate-float mb-6">
      <svg viewBox="0 0 200 200" class="w-48 h-48 mx-auto">
        <!-- Roda Gigi -->
        <path d="M100 100 L 140 100 A 40 40 0 0 1 100 140 Z" fill="#FBBF24" class="spin-gear" />
        <circle cx="100" cy="100" r="15" fill="#F59E0B" />
        
        <!-- Tubuh Robot -->
        <rect x="60" y="90" width="80" height="70" rx="15" fill="#635BFF" />
        
        <!-- Kepala -->
        <rect x="75" y="50" width="50" height="40" rx="10" fill="#635BFF" />
        
        <!-- Mata -->
        <g class="animate-blink">
          <circle cx="90" cy="65" r="5" fill="white" />
          <circle cx="110" cy="65" r="5" fill="white" />
        </g>
      </svg>
    </div>

    <h1 class="text-3xl font-black text-brand mb-2 tracking-tight">Sistem Sedang "Deep Sleep"</h1>
    <p class="text-gray-500 font-medium text-sm mb-8">
      Sibuk BOS sedang dalam tahap perbaikan rutin agar performanya kembali maksimal. Mohon bersabar sejenak!
    </p>

    <button onclick="window.location.reload()" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-black py-4 rounded-2xl shadow-lg transition-all active:scale-95 mb-4">
      Coba Masuk Lagi
    </button>
    
    <button onclick="hubungiAdminWa()" class="text-gray-400 font-bold text-xs hover:text-indigo-600 transition-colors">
      Butuh bantuan? Klik di sini
    </button>
  </div>

  <script>
    function hubungiAdminWa() {
      const nomorWA = "6282114445631"; 
      const pesan = "Halo Admin, saya melihat aplikasi SIBUK BOS sedang maintenance. Kira-kira kapan kembali normal ya?";
      window.open("https://wa.me/" + nomorWA + "?text=" + encodeURIComponent(pesan), '_blank');
    }
  </script>
</body>
</html>
