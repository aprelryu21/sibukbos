  <style>
    /* Reset semua margin agar iframe menempel penuh ke tepi layar */
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100vh;
      overflow: hidden; /* Mencegah scrollbar ganda (hanya dari iframe saja) */
      background-color: #F6F9FC; /* Warna surface SIBUK BOS */
    }

    /* Membuat iframe memenuhi 100% layar */
    iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }
    
    /* Loading screen sementara selagi iframe memuat data dari Google */
    #loader {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      color: #635BFF;
      font-weight: bold;
      text-align: center;
      z-index: -1; /* Berada di bawah iframe */
    }
  </style>
</head>
